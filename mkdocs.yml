site_name: SN Wiki
docs_dir: ..
site_dir: ../../site
theme:
  name: 'readthedocs'
  custom_dir: 'theme'
  navigation_depth: 2
repo_url: https://github.com/s0l0guy/SuperNOVA-Wiki
edit_uri: https://github.com/s0l0guy/SuperNOVA-Wiki/edit/main
site_author: Evan Grinnell
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - footnotes
  - attr_list
exclude_docs: |
  !.images